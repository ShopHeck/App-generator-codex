# docker-compose.test.yml — integration test environment
#
# Provides an isolated Postgres instance for integration tests.
# The `test-runner` service runs `npm run test:integration` against it.
#
# Usage:
#   docker compose -f docker-compose.test.yml up --abort-on-container-exit --exit-code-from test-runner

services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: app_generator_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 3s
      timeout: 5s
      retries: 15

  test-runner:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm ci && node scripts/migrate.js && npm run test:integration"
    environment:
      POSTGRES_HOST: postgres-test
      POSTGRES_PORT: 5432
      POSTGRES_DB: app_generator_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      INTEGRATION_TEST: "1"
      NODE_ENV: test
    volumes:
      - .:/app
    depends_on:
      postgres-test:
        condition: service_healthy
