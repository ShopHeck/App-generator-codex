# docker-compose.yml — local full-stack development
#
# Starts:
#   - postgres   — local Postgres 15 database
#   - api        — Node.js API server (src/backend/server.js)
#   - dashboard  — static dashboard server (src/orchestration/dashboard-server.js)
#
# Usage:
#   docker compose up          # start everything
#   docker compose run api sh  # shell into API container

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: app_generator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    environment:
      NODE_ENV: production
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: app_generator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PORT: 3001
      LOG_LEVEL: info
      # Override with real keys in .env.local:
      # OPENAI_API_KEY: sk-...
      # JWT_SECRET: change-me-min-32-chars-long
      # SUPABASE_URL: https://xyz.supabase.co
      # SUPABASE_SERVICE_ROLE_KEY: ...
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    image: node:22-alpine
    working_dir: /app
    command: node src/orchestration/dashboard-server.js
    restart: unless-stopped
    environment:
      PORT: 4173
    ports:
      - "4173:4173"
    volumes:
      - .:/app:ro
    depends_on:
      - api

volumes:
  postgres_data:
